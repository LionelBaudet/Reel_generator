prompt:
  title: "Meeting Prep"
  text: |
    reunion client demain 9h.
    budget Q2. premier call avec eux.
  output_preview: |
    Meeting Prep - Client Call Q2

    Context:
    First call. Topic: Q2 budget review.
    Recommended duration: 45-60 min.

    Your 3 Objectives:
    1. Understand their Q2 priorities
    2. Identify budget constraints
    3. Agree on timeline and next steps

    5 Smart Questions to Ask:
    - What is your main priority for Q2?
    - What does success look like for you?
    - What is your current budget range?
    - Who are the key decision-makers?
    - What are your biggest blockers?

    After the Call:
    - Send recap email within 2 hours
    - Propose next meeting within 1 week
  saves: "30 min/meeting"
  duration: 14

