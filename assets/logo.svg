<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cercle principal de l'horloge -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#E8B84B" stroke-width="4"/>
  <!-- Marques des heures -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="90" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="50" x2="18" y2="50" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="90" y2="50" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  <!-- Aiguille des heures -->
  <line x1="50" y1="50" x2="50" y2="28" stroke="#E8B84B" stroke-width="4" stroke-linecap="round"/>
  <!-- Aiguille des minutes -->
  <line x1="50" y1="50" x2="68" y2="40" stroke="#F2F0EA" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="50" cy="50" r="4" fill="#E8B84B"/>
</svg>
